<!DOCTYPE html>
<html lang="no">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Leik</title>
        <link rel="stylesheet" href="css/style.css">
        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    </head>
    <body>
          <!----------------------- Meny -------------------------->

        <header>
            <nav>
                <ul>
                    <li><a href="index.html">Leik</a></li>
                    <li><a href="favoritter.html">Favoritter</a></li>
                    <li><a href="om.html">Om oss</a></li>
                    <li><a href="kontakt.html">Kontakt</a></li>
                </ul>
            </nav>
        </header>

        <main>  

                <!----------------- Steg-forklaring ------------------->
           <div class="steg-container">

               <div class="steg">
                  <span class="steg-nummer">1</span>
                  <p>Fyll inn info om barna og hvor dere er</p>
               </div>

               <div class="steg">
                  <span class="steg-nummer">2</span>
                  <p>Trykk "Klar.. ferdig.. LEIK!"</p>
               </div>

               <div class="steg">
                  <span class="steg-nummer">3</span>
                  <p>Len deg tilbake og nyt – eller bli med da vel! 🎉</p>
               </div>
           </div>

               <!-------------------- Leke generator ------------------->
            <div class="generator" id="generator">
              <form id="leik-form">
                <fieldset>
                    <legend>Antall Barn</legend>
                 <!-------------- Radio knapper for antall barn ------------------->

                    <div class="radio-valg">
                        <input type="radio" id="en" name="antall" value="1">
                        <label for="en">1 barn</label>
                    </div>

                    <div class="radio-valg">
                        <input type="radio" id="to-tre" name="antall" value="2-3">
                        <label for="to-tre">2-3 barn</label>
                    </div>

                    <div class="radio-valg">
                        <input type="radio" id="fire-seks" name="antall" value="4-6">
                        <label for="fire-seks">4-6 barn</label>
                    </div>

                    <div class="radio-valg">
                        <input type="radio" id="mange" name="antall" value="7+">
                        <label for="mange">7+ barn</label>
                    </div>

                </fieldset>

                <!-------------- Alder-felt genereres her dynamisk med JavaScript ------------------->
                <div id="alder-container"></div>


                <fieldset>
                    <legend>Miljø</legend>
                      <!-------------- Radio knapper for miljø ------------------->

                    <div class="radio-valg">
                        <input type="radio" id="inne" name="sted" value="inne">
                        <label for="inne">Inne</label>
                    </div>

                    <div class="radio-valg">
                        <input type="radio" id="ute" name="sted" value="ute">
                        <label for="ute">Ute</label>
                    </div>

                    <div class="radio-valg">
                        <input type="radio" id="skog" name="sted" value="skog">
                        <label for="skog">Skog</label>
                    </div>

                    <div class="radio-valg">
                         <input type="radio" id="strand" name="sted" value="strand">
                         <label for="strand">Strand</label>
                    </div>

                    <div class="radio-valg">
                        <input type="radio" id="sno" name="sted" value="sno">
                        <label for="sno">Snø</label> 
                    </div>             
                </fieldset>

                <!--------------------- Utstyr ------------------->
                <label for="utstyr">Utstyr (valgfritt)</label>
                <input type="text" id="utstyr" name="utstyr" placeholder="F.eks. ball, spade">

                <!---------------------  knapp ------------------->
                <button type="submit">Klar.. ferdig.. LEIK!</button>

              </form>
            </div>


        </main>

        <footer>

        </footer>

        <script src="js/config.js"></script>
        <script src="js/main.js"></script>
        <script src="js/generator.js"></script>
    </body>
</html>
